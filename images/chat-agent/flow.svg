<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 960" width="1120" height="960" role="img" aria-labelledby="ttl desc">
  <title id="ttl">Portfolio Chat Agent: information flow</title>
  <desc id="desc">Build-time embeddings (e5 retrieval index, MiniLM English gate, bge-small-zh Chinese gate) are served as static JSON. Per turn: the browser sends the query to the serverless /embed endpoint which returns an e5 query vector and a relevance gate verdict; off-topic queries stop after one call. On a pass, the browser runs cosine similarity over index.json to get top-k passages, injects them into the prompt, and calls /chat which invokes the cloud LLM API. If the function is unavailable, a consent-gated in-browser MiniLM model handles retrieval locally.</desc>
  <style>
    text{font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;fill:#131313;}
    .bg{fill:#ffffff;}
    .t-title{font-size:17px;font-weight:700;}
    .t-band{font-size:12.5px;font-weight:700;letter-spacing:.05em;fill:#5f6368;}
    .t-node{font-size:13px;font-weight:600;text-anchor:middle;}
    .t-nodeL{font-size:13px;font-weight:600;}
    .t-sub{font-size:11px;fill:#5f6368;text-anchor:middle;}
    .t-subL{font-size:11px;fill:#5f6368;}
    .t-lbl{font-size:11px;font-weight:700;letter-spacing:.04em;}
    .t-edge{font-size:10.5px;fill:#5f6368;font-weight:600;}
    .t-num{font-size:12px;font-weight:700;fill:#ffffff;text-anchor:middle;}
    .lbl-client{fill:#0b57d0;} .lbl-server{fill:#0d9488;}
    .txt-stop{fill:#c0392b;} .txt-ext{fill:#b45309;}
    .band{fill:#f4f5f7;stroke:#dfe1e5;stroke-width:1.2;}
    .col-client{fill:rgba(11,87,208,.07);stroke:#0b57d0;stroke-width:1.4;}
    .col-server{fill:rgba(13,148,136,.07);stroke:#0d9488;stroke-width:1.4;}
    .node{fill:#ffffff;stroke:#dfe1e5;stroke-width:1.3;}
    .node-client{fill:#ffffff;stroke:#0b57d0;stroke-width:1.5;}
    .node-server{fill:#ffffff;stroke:#0d9488;stroke-width:1.5;}
    .node-ext{fill:rgba(180,83,9,.08);stroke:#b45309;stroke-width:1.5;}
    .node-stop{fill:rgba(192,57,43,.07);stroke:#c0392b;stroke-width:1.4;}
    .flow{stroke:#9aa0a6;stroke-width:2;fill:none;}
    .flow-dash{stroke:#9aa0a6;stroke-width:1.8;fill:none;stroke-dasharray:5 4;}
    .arrowhead{fill:#9aa0a6;}
    .badge{fill:#0b57d0;}
    @media (prefers-color-scheme: dark){
      text{fill:#e9e9ea;}
      .bg{fill:#0c0c0c;}
      .t-band,.t-sub,.t-subL,.t-edge{fill:#9aa0a6;}
      .t-num{fill:#ffffff;}
      .lbl-client{fill:#8ab4f8;} .lbl-server{fill:#5eead4;}
      .txt-stop{fill:#f87171;} .txt-ext{fill:#fbbf24;}
      .band{fill:#161616;stroke:#2c2c2c;}
      .col-client{fill:rgba(138,180,248,.10);stroke:#8ab4f8;}
      .col-server{fill:rgba(94,234,212,.10);stroke:#5eead4;}
      .node{fill:#1b1b1b;stroke:#2c2c2c;}
      .node-client{fill:#1b1b1b;stroke:#8ab4f8;}
      .node-server{fill:#1b1b1b;stroke:#5eead4;}
      .node-ext{fill:rgba(251,191,36,.10);stroke:#fbbf24;}
      .node-stop{fill:rgba(248,113,113,.10);stroke:#f87171;}
      .flow,.flow-dash{stroke:#6b7075;}
      .arrowhead{fill:#6b7075;}
      .badge{fill:#1a5fd0;}
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrowhead"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="960"/>
  <text class="t-title" x="34" y="36">Portfolio Chat Agent: information flow</text>

  <!-- ===================== BUILD TIME BAND ===================== -->
  <rect class="band" x="30" y="54" width="1060" height="228" rx="16"/>
  <text class="t-band" x="50" y="80">BUILD TIME · one-time, offline</text>

  <rect class="node" x="54" y="112" width="196" height="150" rx="12"/>
  <text class="t-node" x="152" y="160">Knowledge sources</text>
  <text class="t-sub"  x="152" y="184">about_en.md</text>
  <text class="t-sub"  x="152" y="204">about_zh.md</text>

  <rect class="node" x="330" y="112" width="182" height="48" rx="10"/>
  <text class="t-node" x="421" y="132">e5 encoder</text>
  <text class="t-sub"  x="421" y="149">retrieval</text>
  <rect class="node" x="330" y="172" width="182" height="48" rx="10"/>
  <text class="t-node" x="421" y="192">MiniLM</text>
  <text class="t-sub"  x="421" y="209">English gate</text>
  <rect class="node" x="330" y="232" width="182" height="48" rx="10"/>
  <text class="t-node" x="421" y="252">bge-small-zh</text>
  <text class="t-sub"  x="421" y="269">Chinese gate</text>

  <rect class="node" x="592" y="112" width="214" height="48" rx="10"/>
  <text class="t-node" x="699" y="132">index.json</text>
  <text class="t-sub"  x="699" y="149">retrieval index · e5</text>
  <rect class="node" x="592" y="172" width="214" height="48" rx="10"/>
  <text class="t-node" x="699" y="192">gate vectors · EN</text>
  <text class="t-sub"  x="699" y="209">MiniLM</text>
  <rect class="node" x="592" y="232" width="214" height="48" rx="10"/>
  <text class="t-node" x="699" y="252">gate vectors · ZH</text>
  <text class="t-sub"  x="699" y="269">bge-zh</text>

  <rect class="node" x="842" y="120" width="222" height="134" rx="12"/>
  <text class="t-nodeL" x="862" y="152">Static assets</text>
  <text class="t-subL"  x="862" y="176">Bundled as static JSON,</text>
  <text class="t-subL"  x="862" y="194">served with the site and</text>
  <text class="t-subL"  x="862" y="212">downloaded by the</text>
  <text class="t-subL"  x="862" y="230">browser.</text>

  <path class="flow" marker-end="url(#arrow)" d="M250,150 C295,150 295,136 328,136"/>
  <path class="flow" marker-end="url(#arrow)" d="M250,180 C295,180 295,196 328,196"/>
  <path class="flow" marker-end="url(#arrow)" d="M250,210 C295,210 295,256 328,256"/>
  <path class="flow" marker-end="url(#arrow)" d="M512,136 H590"/>
  <path class="flow" marker-end="url(#arrow)" d="M512,196 H590"/>
  <path class="flow" marker-end="url(#arrow)" d="M512,256 H590"/>
  <path class="flow" marker-end="url(#arrow)" d="M806,136 C824,136 824,178 840,178"/>
  <path class="flow" marker-end="url(#arrow)" d="M806,196 H840"/>
  <path class="flow" marker-end="url(#arrow)" d="M806,256 C824,256 824,210 840,210"/>

  <path class="flow-dash" marker-end="url(#arrow)" d="M953,254 C953,306 640,300 474,332"/>
  <text class="t-edge" x="690" y="300">downloaded to browser</text>

  <!-- ===================== RUNTIME ===================== -->
  <text class="t-band" x="34" y="320">RUNTIME · per turn</text>

  <rect class="col-client" x="30" y="332" width="486" height="472" rx="16"/>
  <text class="t-lbl lbl-client" x="50" y="356">BROWSER: client widget</text>
  <rect class="col-server" x="634" y="332" width="456" height="472" rx="16"/>
  <text class="t-lbl lbl-server" x="654" y="356">SERVERLESS FUNCTION</text>

  <rect class="node-client" x="52" y="378" width="442" height="44" rx="10"/>
  <text class="t-node" x="273" y="405">User query</text>

  <rect class="node-client" x="52" y="472" width="442" height="44" rx="10"/>
  <text class="t-node" x="273" y="499">e5 query vector + gate verdict returned</text>

  <rect class="node-client" x="52" y="550" width="442" height="66" rx="10"/>
  <text class="t-node" x="273" y="577">Cosine similarity over index.json</text>
  <text class="t-sub"  x="273" y="597">→ top-k passages · retrieval runs in the browser</text>

  <rect class="node-client" x="52" y="644" width="442" height="44" rx="10"/>
  <text class="t-node" x="273" y="671">Inject top-k passage text into the prompt</text>

  <rect class="node-client" x="52" y="728" width="442" height="48" rx="10"/>
  <text class="t-node" x="273" y="757">Render grounded answer</text>

  <rect class="node-server" x="656" y="378" width="412" height="112" rx="10"/>
  <text class="t-nodeL" x="676" y="406">/embed</text>
  <text class="t-subL"  x="676" y="430">1 · run relevance gate (EN / ZH)</text>
  <text class="t-subL"  x="676" y="448">&#160;&#160;&#160;&#160;on name-normalized text (injection-safe)</text>
  <text class="t-subL"  x="676" y="470">2 · if it passes, embed original text (e5)</text>

  <rect class="node-stop" x="656" y="510" width="256" height="42" rx="10"/>
  <text class="t-nodeL txt-stop" x="676" y="536">off-topic → stops after 1 call</text>

  <rect class="node-server" x="656" y="644" width="412" height="60" rx="10"/>
  <text class="t-nodeL" x="676" y="670">/chat · call LLM</text>
  <text class="t-subL"  x="676" y="690">with top-k contexts injected</text>

  <rect class="node-ext" x="760" y="728" width="308" height="48" rx="10"/>
  <text class="t-node txt-ext" x="914" y="757">LLM · cloud API</text>

  <path class="flow" marker-end="url(#arrow)" d="M494,400 H654"/>
  <circle class="badge" cx="574" cy="386" r="11"/><text class="t-num" x="574" y="390">1</text>

  <path class="flow" marker-end="url(#arrow)" d="M654,468 C560,468 588,494 496,494"/>
  <circle class="badge" cx="574" cy="464" r="11"/><text class="t-num" x="574" y="468">2</text>
  <text class="t-edge" x="600" y="458">gate pass</text>

  <path class="flow" marker-end="url(#arrow)" d="M760,490 V508"/>
  <text class="t-edge" x="768" y="504">fail</text>

  <path class="flow" marker-end="url(#arrow)" d="M273,516 V548"/>
  <circle class="badge" cx="243" cy="532" r="11"/><text class="t-num" x="243" y="536">3</text>
  <path class="flow" marker-end="url(#arrow)" d="M273,616 V644"/>

  <path class="flow" marker-end="url(#arrow)" d="M494,666 H654"/>
  <circle class="badge" cx="574" cy="652" r="11"/><text class="t-num" x="574" y="656">4</text>

  <path class="flow" marker-end="url(#arrow)" d="M862,704 V726"/>
  <circle class="badge" cx="892" cy="712" r="11"/><text class="t-num" x="892" y="716">5</text>

  <path class="flow" marker-end="url(#arrow)" d="M760,752 C600,752 640,752 496,752"/>
  <circle class="badge" cx="574" cy="738" r="11"/><text class="t-num" x="574" y="742">6</text>
  <text class="t-edge" x="600" y="746">answer</text>

  <!-- ===================== OFFLINE FALLBACK ===================== -->
  <text class="t-band" x="34" y="838">OFFLINE FALLBACK · serverless function unavailable</text>
  <rect class="band" x="30" y="850" width="1060" height="92" rx="16"/>

  <rect class="node" x="50" y="872" width="150" height="48" rx="10"/>
  <text class="t-node" x="125" y="901">Function down</text>

  <rect class="node-client" x="228" y="872" width="220" height="48" rx="10"/>
  <text class="t-node" x="338" y="894">Consent prompt</text>
  <text class="t-sub"  x="338" y="911">allow ~23 MB MiniLM download?</text>

  <rect class="node" x="476" y="872" width="196" height="48" rx="10"/>
  <text class="t-node" x="574" y="894">In-browser MiniLM</text>
  <text class="t-sub"  x="574" y="911">embeds the query locally</text>

  <rect class="node" x="700" y="872" width="196" height="48" rx="10"/>
  <text class="t-node" x="798" y="894">Local retrieval</text>
  <text class="t-sub"  x="798" y="911">over fallback_vectors.json</text>

  <rect class="node" x="924" y="872" width="146" height="48" rx="10"/>
  <text class="t-node" x="997" y="894">Local answer /</text>
  <text class="t-node" x="997" y="911">suggested links</text>

  <path class="flow" marker-end="url(#arrow)" d="M200,896 H226"/>
  <path class="flow" marker-end="url(#arrow)" d="M448,896 H474"/>
  <path class="flow" marker-end="url(#arrow)" d="M672,896 H698"/>
  <path class="flow" marker-end="url(#arrow)" d="M896,896 H922"/>
</svg>
